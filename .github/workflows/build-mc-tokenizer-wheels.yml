name: Build mc_tokenizer_rs wheels

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-cp313:
    name: Windows wheel (cp313)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install maturin
        run: python -m pip install -U pip maturin

      - name: Build wheel
        working-directory: mc_tokenizer_rs
        run: maturin build --release --out dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: mc_tokenizer_rs-win-cp313
          path: mc_tokenizer_rs/dist/*.whl
